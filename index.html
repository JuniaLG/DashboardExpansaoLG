<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Expansão 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .doughnut-container { position: relative; width: 70px; height: 70px; }
        .doughnut-svg { transform: rotate(-90deg); }
        .bg-brown-medium { background-color: #795548; }
        .text-brown-medium { color: #795548; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <!-- Faixa Superior Marrom -->
    <header class="bg-brown-medium text-white p-5 shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-lg font-bold tracking-tight uppercase">Expansion Management</h1>
            <div class="flex gap-16 text-center">
                <div>
                    <p class="text-[10px] uppercase font-bold opacity-70 mb-1">Lojas Ativas</p>
                    <p id="active-stores" class="text-2xl font-black">0</p>
                </div>
                <div>
                    <p class="text-[10px] uppercase font-bold opacity-70 mb-1">Mais Avançada</p>
                    <p id="top-store" class="text-lg font-bold text-amber-200">-</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-8 md:p-12">
        <!-- Título Principal -->
        <h2 class="text-4xl font-black text-slate-800 mb-12 border-b-8 border-brown-medium inline-block pb-2">Painel de Expansão 2026</h2>
        
        <div id="dashboard-content" class="space-y-16">
            <div class="text-center py-20 text-slate-400 font-medium">Carregando indicadores...</div>
        </div>
    </main>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQCB4hjYl-KUKXubc3bDpM9lT4FYeGJ2kDcztUpWcu2eOq5gJC8R8-5rwcEniR_XxQWXBVOj0qR_zW8/pub?gid=0&single=true&output=csv';

        async function init() {
            Papa.parse(CSV_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    // REGRA: Apenas registros APLICÁVEL = "sim" [3, 4]
                    const data = results.data.filter(row => row['APLICÁVEL?']?.toLowerCase() === 'sim');
                    const storeNames = [...new Set(data.map(d => d.LOJA))];
                    let storeSummaries = [];

                    document.getElementById('dashboard-content').innerHTML = '';

                    storeNames.forEach(name => {
                        const storeData = data.filter(d => d.LOJA === name);
                        const phaseConfigs = ["1 – Pré obra", "2 – Projeto", "3 – Obra", "4 – Pós obra"];
                        let phasesRes = [];

                        phaseConfigs.forEach(pTitle => {
                            const rows = storeData.filter(r => r.FASE.includes(pTitle.split(' – ')[1]));
                            const avg = rows.length > 0 ? (rows.reduce((a, b) => a + parseFloat(b['% CONCLUSÃO'] || 0), 0) / rows.length) : 0;
                            phasesRes.push({ title: pTitle, avg, rows });
                        });

                        // % Loja = média das 4 fases [1]
                        const storeAvg = phasesRes.reduce((acc, curr) => acc + curr.avg, 0) / 4;
                        storeSummaries.push({ name, avg: storeAvg });
                        renderStore(name, phasesRes);
                    });

                    // Atualiza Cabeçalho
                    document.getElementById('active-stores').innerText = storeNames.length;
                    storeSummaries.sort((a, b) => b.avg - a.avg);
                    if(storeSummaries.length > 0) document.getElementById('top-store').innerText = storeSummaries.name;
                }
            });
        }

        function renderStore(name, phases) {
            let html = `
                <div class="bg-white rounded-[40px] shadow-sm border border-slate-200 p-10">
                    <h3 class="text-3xl font-black text-brown-medium mb-10 uppercase tracking-tighter">${name}</h3>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-12">
            `;

            phases.forEach(f => {
                const isObra = f.title.includes("Obra");
                html += `<div class="flex flex-col">
                            <p class="text-[11px] font-black text-slate-400 uppercase mb-6 tracking-widest text-center md:text-left border-b pb-2">${f.title}</p>`;

                if (!isObra) {
                    // Gráfico de Rosca Vazado [Regra 3.1]
                    const radius = 30;
                    const circ = 2 * Math.PI * radius;
                    const offset = circ - (f.avg / 100) * circ;
                    const color = f.avg >= 100 ? '#A5D6A7' : (f.avg > 0 ? '#90CAF9' : '#E0E0E0');
                    
                    html += `
                        <div class="flex flex-col items-center md:items-start">
                            <div class="doughnut-container mb-6">
                                <svg class="doughnut-svg w-20 h-20">
                                    <circle cx="40" cy="40" r="${radius}" fill="transparent" stroke="#F1F5F9" stroke-width="10"/>
                                    <circle cx="40" cy="40" r="${radius}" fill="transparent" stroke="${color}" 
                                            stroke-width="10" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
                                </svg>
                            </div>
                            <div class="space-y-2 w-full">
                                ${f.rows.map(r => `
                                    <div class="flex items-center gap-2">
                                        <div class="w-2 h-2 rounded-full ${parseFloat(r['% CONCLUSÃO']) >= 100 ? 'bg-green-400' : (parseFloat(r['% CONCLUSÃO']) > 0 ? 'bg-blue-300' : 'bg-slate-200')}"></div>
                                        <span class="text-[10px] text-slate-500 font-bold uppercase leading-tight">${r.ATIVIDADE}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                } else {
                    // Gráfico de Barras para Obra [Regra 3.2]
                    html += `<div class="space-y-5">
                        ${f.rows.map(r => `
                            <div>
                                <div class="flex justify-between text-[9px] font-black text-slate-500 uppercase mb-1.5">
                                    <span>${r.ATIVIDADE}</span><span>${parseFloat(r['% CONCLUSÃO']).toFixed(0)}%</span>
                                </div>
                                <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                    <div class="bg-brown-medium h-full rounded-full transition-all duration-1000" style="width:${r['% CONCLUSÃO']}%"></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>`;
                }
                html += `</div>`;
            });

            html += `</div></div>`;
            document.getElementById('dashboard-content').innerHTML += html;
        }

        init();
    </script>
</body>
</html>
