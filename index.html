<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Executivo - Expansão de Lojas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <!-- Tela de Carregamento -->
    <div id="loading" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50">
        <div class="w-12 h-12 border-4 border-slate-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-slate-500">Conectando à base de dados executiva...</p>
    </div>

    <!-- Visão Consolidada Cia -->
    <header id="header-cia" class="hidden bg-slate-900 text-white p-6 shadow-xl sticky top-0 z-40">
        <div class="max-w-7xl mx-auto grid grid-cols-2 lg:grid-cols-4 gap-6 text-center">
            <div class="border-r border-slate-700 last:border-0">
                <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-1">Avanço Médio Cia</p>
                <p id="avg-total" class="text-3xl font-black text-emerald-400">0%</p>
            </div>
            <div class="border-r border-slate-700 last:border-0">
                <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-1">Lojas Ativas</p>
                <p id="active-stores" class="text-3xl font-black">0</p>
            </div>
            <div class="border-r border-slate-700 last:border-0">
                <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-1">Loja + Avançada</p>
                <p id="top-store" class="text-sm font-bold text-emerald-400 truncate px-2">-</p>
            </div>
            <div class="border-r border-slate-700 last:border-0">
                <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-1">Loja + Atrasada</p>
                <p id="bottom-store" class="text-sm font-bold text-rose-400 truncate px-2">-</p>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8" id="dashboard-content"></main>

    <script>
        // Link fornecido pelo usuário via Google Sheets (CSV)
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQCB4hjYl-KUKXubc3bDpM9lT4FYeGJ2kDcztUpWcu2eOq5gJC8R8-5rwcEniR_XxQWXBVOj0qR_zW8/pub?gid=0&single=true&output=csv';

        // Regra de Semáforo BI
        function getTrafficLight(p) {
            if (p >= 75) return 'bg-emerald-500';
            if (p >= 30) return 'bg-amber-500';
            return 'bg-rose-500';
        }

        async function init() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    // REGRA: Filtrar apenas registros onde APLICÁVEL? = "sim" [1]
                    const rawData = results.data.filter(row => row['APLICÁVEL?']?.toLowerCase() === 'sim');
                    const stores = [...new Set(rawData.map(d => d.LOJA))];
                    
                    let ciaTotalSum = 0;
                    let storeRankings = [];

                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('header-cia').classList.remove('hidden');

                    stores.forEach(storeName => {
                        const storeData = rawData.filter(d => d.LOJA === storeName);
                        
                        // Lógica de Fases conforme solicitado [1]
                        const phaseNames = ["1 – Pré obra", "2 – Projeto", "3 – Obra", "4 – Pós obra"];
                        let phasesSummary = [];

                        phaseNames.forEach(pName => {
                            const pRows = storeData.filter(r => r.FASE.includes(pName.split(' – ')[1]));
                            // REGRA: Média das atividades aplicáveis [1]
                            const avg = pRows.length > 0 ? (pRows.reduce((a, b) => a + parseFloat(b['% CONCLUSÃO'] || 0), 0) / pRows.length) : 0;
                            phasesSummary.push({ name: pName, avg: avg, activities: pRows });
                        });

                        // REGRA: % Loja = média das 4 fases [1]
                        const storeAvg = phasesSummary.reduce((acc, curr) => acc + curr.avg, 0) / 4;
                        ciaTotalSum += storeAvg;
                        storeRankings.push({ name: storeName, avg: storeAvg });

                        renderStore(storeName, storeAvg, phasesSummary);
                    });

                    // Atualizar Visão Consolidada
                    document.getElementById('active-stores').innerText = stores.length;
                    document.getElementById('avg-total').innerText = (ciaTotalSum / (stores.length || 1)).toFixed(1) + '%';
                    
                    storeRankings.sort((a, b) => b.avg - a.avg);
                    if (storeRankings.length > 0) {
                        document.getElementById('top-store').innerText = storeRankings.name;
                        document.getElementById('bottom-store').innerText = storeRankings[storeRankings.length - 1].name;
                    }
                }
            });
        }

        function renderStore(name, avg, phases) {
            const container = document.getElementById('dashboard-content');
            
            let html = `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 mb-10 overflow-hidden">
                    <div class="bg-white px-6 py-4 border-b flex justify-between items-center">
                        <h2 class="text-xl font-black text-slate-800 tracking-tight">${name}</h2>
                        <div class="flex items-center gap-3 bg-slate-50 px-3 py-1 rounded-full border">
                            <span class="text-sm font-bold text-slate-600">Progresso Geral: ${avg.toFixed(1)}%</span>
                            <div class="w-3 h-3 rounded-full ${getTrafficLight(avg)}"></div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-0 divide-y md:divide-y-0 md:divide-x divide-slate-100">
            `;

            phases.forEach(f => {
                const isObra = f.name.includes("Obra");
                html += `
                    <div class="p-6">
                        <div class="flex justify-between items-center mb-3">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${f.name}</p>
                            <span class="text-xs font-bold ${isObra ? 'text-blue-600' : 'text-slate-700'}">${f.avg.toFixed(0)}%</span>
                        </div>
                        <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden mb-4">
                            <div class="h-2 ${getTrafficLight(f.avg)}" style="width:${f.avg}%"></div>
                        </div>
                `;

                // REGRA: Fase 3 - OBRA mostra gráfico de barras por atividade [1]
                if (isObra) {
                    html += `<div class="space-y-3 mt-6">`;
                    f.activities.forEach(at => {
                        html += `
                            <div class="group">
                                <div class="flex justify-between text-[9px] font-bold text-slate-500 uppercase mb-1">
                                    <span>${at.ATIVIDADE}</span>
                                    <span>${at['% CONCLUSÃO']}%</span>
                                </div>
                                <div class="w-full bg-slate-50 h-1.5 rounded-full overflow-hidden border border-slate-100">
                                    <div class="bg-blue-500 h-full transition-all duration-500" style="width:${at['% CONCLUSÃO']}%"></div>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
                html += `</div>`;
            });

            html += `</div></div>`;
            container.innerHTML += html;
        }

        init();
    </script>
</body>
</html>
