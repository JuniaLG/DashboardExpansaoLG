<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Expansão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .doughnut-container { position: relative; width: 70px; height: 70px; }
        .doughnut-svg { transform: rotate(-90deg); }
        .bg-brown-medium { background-color: #795548; }
        .bg-obra-done { background-color: #D7CCC8; } 
        .bg-obra-progress { background-color: #FFF59D; } 
        .bg-phase-done { background-color: #A5D6A7; } 
        .bg-phase-progress { background-color: #90CAF9; } 
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <header class="bg-brown-medium text-white p-5 shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter uppercase">LOJAS LA GUAPA 2026</h1>
            <div class="flex gap-16 text-center">
                <div>
                    <p class="text-[10px] uppercase font-bold opacity-70 mb-1">LOJAS EM ANDAMENTO</p>
                    <p id="active-stores" class="text-2xl font-black">0</p>
                </div>
                <div>
                    <p class="text-[10px] uppercase font-bold opacity-70 mb-1">Mais Avançada</p>
                    <p id="top-store" class="text-lg font-bold text-amber-200">-</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-8 md:p-12">
        <h2 class="text-4xl font-black text-slate-800 mb-12 border-b-8 border-brown-medium inline-block pb-2">Painel de Expansão</h2>
        <div id="dashboard-content" class="space-y-16">
            <div id="status-msg" class="text-center py-20 text-slate-400 font-medium tracking-widest uppercase italic">Lendo base de dados...</div>
        </div>
    </main>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQCB4hjYl-KUKXubc3bDpM9lT4FYeGJ2kDcztUpWcu2eOq5gJC8R8-5rwcEniR_XxQWXBVOj0qR_zW8/pub?gid=0&single=true&output=csv';

        async function init() {
            Papa.parse(CSV_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    const rows = results.data;
                    if (!rows || rows.length === 0) {
                        document.getElementById('status-msg').innerHTML = "ERRO: O arquivo CSV está vazio. Verifique a publicação da aba correta.";
                        return;
                    }

                    // Identifica colunas dinamicamente para evitar erros de acento ou símbolos
                    const headers = Object.keys(rows);
                    const findCol = (terms) => headers.find(h => terms.some(t => h.toUpperCase().includes(t)));
                    
                    const colLoja = findCol(["LOJA"]);
                    const colFase = findCol(["FASE"]);
                    const colAtiv = findCol(["ATIVIDADE"]);
                    const colPerc = findCol(["CONCLU", "PERCENTUAL"]);
                    const colAplic = findCol(["APLIC", "SIM"]);

                    // Filtro inteligente: Se não achar a coluna 'Aplicável', tenta achar qualquer coluna que contenha 'sim'
                    const data = rows.filter(row => {
                        if (colAplic) return row[colAplic]?.trim().toLowerCase() === 'sim';
                        return Object.values(row).some(val => val?.trim().toLowerCase() === 'sim');
                    });

                    if (data.length === 0) {
                        document.getElementById('status-msg').innerHTML = "CONEXÃO OK, MAS NENHUMA LINHA COM 'SIM' FOI ENCONTRADA.<br><small>Headers detectados: " + headers.join(", ") + "</small>";
                        return;
                    }

                    const storeNames = [...new Set(data.map(d => d[colLoja]))];
                    let storeSummaries = [];
                    document.getElementById('dashboard-content').innerHTML = '';

                    storeNames.forEach(name => {
                        const storeData = data.filter(d => d[colLoja] === name);
                        const phaseConfigs = [
                            { display: "1 – Pré obra", search: "PRE" },
                            { display: "2 – Projeto", search: "PROJ" },
                            { display: "3 – Obra", search: "OBRA" },
                            { display: "4 – Pós obra", search: "POS" }
                        ];
                        let phasesRes = [];

                        phaseConfigs.forEach(conf => {
                            const pRows = storeData.filter(r => r[colFase]?.toUpperCase().normalize("NFD").includes(conf.search));
                            const avg = pRows.length > 0 ? (pRows.reduce((a, b) => a + parseFloat(b[colPerc]?.replace(',','.') || 0), 0) / pRows.length) : 0;
                            phasesRes.push({ title: conf.display, avg, rows: pRows, colAtiv, colPerc });
                        });

                        const storeAvg = phasesRes.reduce((acc, curr) => acc + curr.avg, 0) / 4;
                        storeSummaries.push({ name, avg: storeAvg });
                        renderStore(name, phasesRes);
                    });

                    document.getElementById('active-stores').innerText = storeNames.length;
                    storeSummaries.sort((a, b) => b.avg - a.avg);
                    if(storeSummaries.length > 0) document.getElementById('top-store').innerText = storeSummaries.name;
                }
            });
        }

        function renderStore(name, phases) {
            let html = `<div class="bg-white rounded-[40px] shadow-sm border border-slate-200 p-10">
                            <h3 class="text-3xl font-black text-[#795548] mb-10 uppercase tracking-tighter">${name}</h3>
                            <div class="grid grid-cols-1 md:grid-cols-4 gap-12">`;

            phases.forEach(f => {
                const isObra = f.title.includes("Obra");
                const isPhaseDone = f.avg >= 100;
                html += `<div class="flex flex-col">
                            <div class="flex justify-between items-center border-b pb-2 mb-6">
                                <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest">${f.title}</p>
                                ${isObra ? `<span class="text-[11px] font-black text-[#795548]">${f.avg.toFixed(0)}%</span>` : ''}
                            </div>`;

                if (!isObra) {
                    const radius = 30, circ = 2 * Math.PI * radius, offset = circ - (Math.min(f.avg, 100) / 100) * circ;
                    const color = isPhaseDone ? '#A5D6A7' : '#90CAF9';
                    html += `<div class="flex flex-col items-center md:items-start">
                                <div class="doughnut-container mb-6">
                                    <svg class="doughnut-svg w-20 h-20"><circle cx="40" cy="40" r="${radius}" fill="transparent" stroke="#F1F5F9" stroke-width="10"/><circle cx="40" cy="40" r="${radius}" fill="transparent" stroke="${color}" stroke-width="10" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"/></svg>
                                </div>
                                <div class="space-y-2 w-full">
                                    ${f.rows.map(r => {
                                        const p = parseFloat(r[f.colPerc]?.replace(',','.') || 0);
                                        return `<div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full ${p >= 100 ? (isPhaseDone ? 'bg-green-400' : 'bg-blue-400') : 'bg-slate-200'}"></div><span class="text-[10px] text-slate-500 font-bold uppercase leading-tight">${r[f.colAtiv]}</span></div>`
                                    }).join('')}
                                </div>
                            </div>`;
                } else {
                    html += `<div class="space-y-5">${f.rows.map(r => {
                        const perc = parseFloat(r[f.colPerc]?.replace(',','.') || 0);
                        let barColor = 'bg-slate-200';
                        if (isPhaseDone) barColor = 'bg-phase-done';
                        else if (perc >= 100) barColor = 'bg-obra-done';
                        else if (perc > 0) barColor = 'bg-obra-progress';
                        return `<div><div class="flex justify-between text-[9px] font-black text-slate-500 uppercase mb-1.5"><span>${r[f.colAtiv]}</span><span>${perc.toFixed(0)}%</span></div><div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden"><div class="${barColor} h-full rounded-full transition-all duration-1000" style="width:${perc}%"></div></div></div>`;
                    }).join('')}</div>`;
                }
                html += `</div>`;
            });
            html += `</div></div>`;
            document.getElementById('dashboard-content').innerHTML += html;
        }
        init();
    </script>
</body>
</html>
